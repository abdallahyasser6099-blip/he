<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CANHYGIENE - Team 9 Presentation</title>
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif;background:#06112f;color:white;overflow:hidden} .app{height:100vh;position:relative;overflow:hidden}.bg,.grid,.vignette{position:absolute;inset:0}.grid{background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:56px 56px}.vignette{background:radial-gradient(circle at center,transparent 0,rgba(2,6,23,.28) 72%)}.wrap{position:relative;z-index:2;height:100vh;max-width:1280px;margin:auto;padding:20px 24px;display:flex;flex-direction:column}.bar,.footer{border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);backdrop-filter:blur(22px);box-shadow:0 20px 60px rgba(0,0,0,.25);border-radius:24px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:12px}.logoBox{position:relative;border-radius:18px;background:rgba(255,255,255,.1);padding:8px;box-shadow:0 15px 35px rgba(0,0,0,.25)}.logoBox:before{content:"";position:absolute;inset:0;background:rgba(34,211,238,.22);filter:blur(16px);border-radius:18px}.logo{position:relative;height:40px;width:auto;display:block}.brandTitle{font-weight:900;font-size:18px}.brandSub{font-size:12px;text-transform:uppercase;letter-spacing:.24em}.right{display:flex;align-items:center;gap:12px}.auto,.count,.mid{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.1);border-radius:16px;color:inherit;padding:8px 12px;font-weight:800;font-size:12px}.dots{display:flex;gap:8px}.dot{height:10px;width:10px;border-radius:999px;background:rgba(255,255,255,.25);border:0;transition:.25s}.dot.active{width:30px}.progress{height:6px;background:rgba(255,255,255,.1);border-radius:99px;margin:12px 0;overflow:hidden}.progress div{height:100%;border-radius:99px;transition:.4s}.main{position:relative;min-height:0;flex:1}.slide{position:relative;height:100%;overflow:hidden;border-radius:34px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.065);backdrop-filter:blur(24px);box-shadow:0 35px 100px rgba(3,10,45,.45);padding:32px;animation:enter .45s ease}.slide:before,.slide:after{content:"";position:absolute;border-radius:999px;filter:blur(60px);opacity:.65}.slide:before{width:280px;height:280px;right:-90px;top:-90px;background:rgba(34,211,238,.12)}.slide:after{width:220px;height:220px;left:-70px;bottom:35px;background:rgba(59,130,246,.12)}@keyframes enter{from{opacity:0;transform:translateY(20px) scale(.985)}to{opacity:1;transform:none}}.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(103,232,249,.3);background:rgba(34,211,238,.1);color:#cffafe;border-radius:999px;padding:9px 16px;font-size:14px;font-weight:800;backdrop-filter:blur(18px);margin-bottom:16px}.title{font-size:clamp(38px,4vw,64px);line-height:.98;font-weight:950;letter-spacing:-.04em;margin:0;max-width:1050px}.subtitle{font-size:clamp(22px,2.2vw,30px);line-height:1.25;color:#67e8f9;font-weight:800;max-width:850px;margin:22px 0 0}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:32px;max-width:850px}.card{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.085);backdrop-filter:blur(22px);border-radius:28px;padding:20px;box-shadow:0 24px 70px rgba(8,20,60,.25);font-weight:850;font-size:19px}.bulletGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:32px}.bullet{display:flex;gap:16px;align-items:flex-start;min-height:104px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.085);backdrop-filter:blur(22px);border-radius:27px;padding:20px;box-shadow:0 22px 60px rgba(8,20,60,.22)}.num{flex:0 0 40px;height:40px;border-radius:14px;background:rgba(52,211,153,.18);color:#a7f3d0;display:flex;align-items:center;justify-content:center;font-weight:950}.bullet p{margin:0;font-size:18px;line-height:1.45;font-weight:750}.danger .slide{border-color:rgba(248,113,113,.25);background:rgba(69,10,10,.24)}.yellow .slide{border-color:rgba(253,224,71,.25);background:rgba(113,63,18,.22)}.green .slide{border-color:rgba(110,231,183,.25);background:rgba(6,78,59,.24)}.danger .title,.danger .pill{color:#fee2e2}.yellow .title,.yellow .pill{color:#fef9c3}.green .title,.green .pill{color:#ecfdf5}.danger .pill{border-color:rgba(248,113,113,.45);background:rgba(239,68,68,.13)}.yellow .pill{border-color:rgba(253,224,71,.45);background:rgba(250,204,21,.13)}.green .pill{border-color:rgba(110,231,183,.45);background:rgba(16,185,129,.13)}.danger .bullet{border-color:rgba(248,113,113,.35);background:rgba(239,68,68,.12);box-shadow:0 20px 60px rgba(239,68,68,.22)}.yellow .bullet{border-color:rgba(253,224,71,.35);background:rgba(250,204,21,.12);box-shadow:0 20px 60px rgba(245,158,11,.22)}.green .bullet{border-color:rgba(110,231,183,.3);background:rgba(110,231,183,.12);box-shadow:0 22px 65px rgba(16,185,129,.24)}.featureGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:28px}.feature{border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.085);backdrop-filter:blur(22px);border-radius:27px;padding:16px;box-shadow:0 22px 60px rgba(8,20,60,.22)}.orb{height:42px;width:42px;border-radius:16px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:inset 0 1px 0 rgba(255,255,255,.55),0 18px 40px rgba(8,20,70,.3)}.feature h3{margin:12px 0 4px;font-size:18px}.feature p{margin:0;color:#cbd5e1;line-height:1.55;font-size:14px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:32px}.metric{text-align:center;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.085);border-radius:29px;padding:22px;backdrop-filter:blur(22px);box-shadow:0 22px 60px rgba(8,20,60,.22)}.metric b{font-size:clamp(36px,4vw,54px);color:#67e8f9}.metric p{color:#cbd5e1;margin:12px 0 0;line-height:1.5}.mock{margin-top:20px;max-width:980px;border-radius:32px;overflow:hidden;background:#d9fbf7;color:#243887;border:1px solid rgba(255,255,255,.25);box-shadow:0 30px 90px rgba(0,0,0,.38)}.mockIn{display:flex;min-height:330px}.side{width:132px;background:#243887;color:white;padding:16px}.sideLogo{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-weight:900;font-size:11px;line-height:1.1}.sideBadge{height:36px;width:36px;border-radius:12px;background:#1fc7b5;display:flex;align-items:center;justify-content:center}.menuItem{display:flex;gap:8px;align-items:center;border-radius:12px;padding:8px;margin-bottom:8px;font-size:11px;color:rgba(255,255,255,.75)}.menuItem.active{background:rgba(255,255,255,.18);color:white}.content{flex:1;padding:16px}.topline{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.search{background:white;border-radius:14px;padding:10px 14px;width:320px;color:#94a3b8;font-size:12px;box-shadow:0 10px 28px rgba(0,0,0,.12)}.banner{background:#243887;color:white;border-radius:22px;padding:16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}.miniGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.mini{background:white;border-radius:22px;padding:16px;box-shadow:0 12px 28px rgba(0,0,0,.14)}.footer{margin-top:14px}.nav{height:44px;border-radius:16px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:white;padding:0 24px;font-weight:900}.next{color:#06112f}.glow{position:absolute;width:220px;height:220px;right:40px;top:35%;border-radius:50%;background:rgba(34,211,238,.3);filter:blur(52px);animation:glow 6s ease-in-out infinite;pointer-events:none}.glow.two{right:180px;top:auto;bottom:20px;opacity:.6}@keyframes glow{0%,100%{transform:scale(1);opacity:.35}50%{transform:scale(1.2);opacity:.7}}@media(max-width:900px){.featureGrid,.metrics{grid-template-columns:repeat(2,1fr)}.cards,.bulletGrid{grid-template-columns:1fr}.title{font-size:34px}.subtitle{font-size:20px}.wrap{padding:12px}.right .dots{display:none}.mock{transform:scale(.88);transform-origin:top left;width:112%}}
  </style>
</head>
<body>
  <div id="app" class="app"></div>
  <script>
    const icons={logo:'◆',problem:'⚠️',solution:'🚀',manager:'👔',team:'👥',target:'🎯',chart:'📊',growth:'📈',search:'🔎',star:'⭐',evaluation:'📋',decision:'🧭',value:'💎',trophy:'🏆',dashboard:'▦',briefcase:'💼',kpi:'📌',insight:'💡',training:'🏫',meeting:'🤝',calendar:'📅'};
    const slides=[
      {type:'hero',icon:'target',eyebrow:'Performance challenge',title:'Why do companies still struggle to make the right HR decisions?',subtitle:'Despite having data, decisions are still slow, unclear, and sometimes wrong.',points:['Too much scattered data','No clear decision view','Time lost in analysis']},
      {type:'hero',icon:'manager',eyebrow:'Real story',title:'Meet Miss Amina, HR manager at Canhygiene.',subtitle:'Miss Amina manages employee performance using Excel files and separate evaluation tools.',points:['Works with Excel sheets','Uses evaluation tools','Tries to organize everything']},
      {type:'danger',theme:'red',icon:'problem',eyebrow:'Problem',title:'Miss Amina’s workflow is broken and inefficient.',points:['Data is scattered across multiple files','Evaluations are not centralized','No clear visibility on performance','Decisions are slow and risky']},
      {type:'danger',theme:'red',icon:'problem',eyebrow:'Impact',title:'This leads to poor company performance.',points:['Wrong decisions about employees','Loss of productivity','No clear growth strategy','Managers overwhelmed with data']},
      {type:'danger',theme:'yellow',icon:'briefcase',eyebrow:'Existing solutions',title:'Current tools fail to solve the problem.',points:['Complex systems hard to use','Still rely on Excel','Focus on data, not decisions','No real intelligence']},
      {type:'success',icon:'solution',eyebrow:'Our solution',title:'A smart SaaS platform that transforms data into decisions.',points:['All data centralized','Clear performance visibility','Instant decision support','Direct link to employee growth']},
      {type:'premium',icon:'decision',eyebrow:'How it works',title:'From search to decision in seconds.',points:['Search employee','View performance instantly','Analyze strengths & gaps','Make decision directly']},
      {type:'product',icon:'dashboard',eyebrow:'Platform',title:'A modern and intuitive interface.'},
      {type:'product',icon:'dashboard',eyebrow:'User experience',title:'Simple and accessible for any manager.'},
      {type:'featureGrid',icon:'insight',eyebrow:'Features',title:'Everything needed in one platform.',features:[['search','Smart Search','Find employees instantly'],['kpi','KPIs','Track performance clearly'],['star','Top Talent','Identify best performers'],['training','Training','Improve employees'],['calendar','Tracking','Follow progress'],['meeting','Decisions','Make better choices']]},
      {type:'premium',icon:'chart',eyebrow:'Analytics',title:'Smart insights for better decisions.',points:['Department dashboards','Skill gap detection','Performance ranking','Historical analysis']},
      {type:'saas',icon:'growth',eyebrow:'SaaS Value',title:'A scalable SaaS platform.',metrics:[['80%','less manual work'],['3x','faster evaluations'],['+40%','better decisions'],['24/7','cloud access']]},
      {type:'premium',icon:'value',eyebrow:'Why us',title:'Why our solution wins.',points:['All-in-one platform','Easy to use','Real-time insights','Scalable system']},
      {type:'impact',icon:'growth',eyebrow:'Results',title:'Real impact on companies.',metrics:[['70%','time saved'],['+30%','faster decisions'],['100%','visibility'],['1','platform']]},
      {type:'final',icon:'value',eyebrow:'Conclusion',title:'From chaos to clarity.',subtitle:'We transform HR decisions.'},
      {type:'bullet',icon:'team',eyebrow:'Status',title:'Already developed and ready.',ordered:true,points:['Complete SaaS workflow','Dashboard and search','Analytics and decisions','Modern UX ready']}
    ];
    let index=0,auto=false,timer=null; const app=document.getElementById('app');
    function theme(s){return s.type==='success'?'green':s.type==='danger'?(s.theme==='yellow'?'yellow':'danger'):'default'}
    function accent(t){return t==='danger'?'#ef4444':t==='yellow'?'#facc15':t==='green'?'#10b981':'#20c9b5'}
    function bg(t){if(t==='danger')return'radial-gradient(circle at 15% 15%, rgba(239,68,68,.58), transparent 30%), radial-gradient(circle at 85% 12%, rgba(185,28,28,.45), transparent 32%), radial-gradient(circle at 50% 100%, rgba(127,29,29,.6), transparent 48%)'; if(t==='yellow')return'radial-gradient(circle at 15% 15%, rgba(250,204,21,.58), transparent 30%), radial-gradient(circle at 85% 12%, rgba(245,158,11,.48), transparent 32%), radial-gradient(circle at 50% 100%, rgba(120,53,15,.6), transparent 48%)'; if(t==='green')return'radial-gradient(circle at 15% 15%, rgba(16,185,129,.58), transparent 30%), radial-gradient(circle at 85% 12%, rgba(34,211,238,.38), transparent 32%), radial-gradient(circle at 50% 100%, rgba(6,95,70,.62), transparent 48%)'; return'radial-gradient(circle at 15% 15%, rgba(31,199,181,.38), transparent 28%), radial-gradient(circle at 85% 10%, rgba(96,165,250,.30), transparent 30%), radial-gradient(circle at 50% 100%, rgba(37,64,143,.55), transparent 45%)'}
    function title(s,d=false,y=false){return `<div class="pill">${d?(y?'⚡':'⚠️'):(icons[s.icon]||icons.logo)} ${s.eyebrow}</div><h1 class="title">${s.title}</h1>${s.subtitle?`<p class="subtitle">${s.subtitle}</p>`:''}`}
    function bullets(s,ordered=false){return `<div class="bulletGrid">${(s.points||[]).map((p,i)=>`<div class="bullet"><div class="num">${ordered?i+1:'✓'}</div><p>${p}</p></div>`).join('')}</div>`}
    function hero(s){return `${title(s)}<div class="cards">${s.points.map((p,i)=>`<div class="card"><div style="font-size:40px;margin-bottom:8px">${[icons.evaluation,icons.insight,icons.growth][i]}</div>${p}</div>`).join('')}</div>`}
    function feature(s){return `${title(s)}<div class="featureGrid">${s.features.map(f=>`<div class="feature"><div class="orb">${icons[f[0]]||icons.logo}</div><h3>${f[1]}</h3><p>${f[2]}</p></div>`).join('')}</div>`}
    function metrics(s){return `${title(s)}<div class="metrics">${s.metrics.map(m=>`<div class="metric"><b>${m[0]}</b><p>${m[1]}</p></div>`).join('')}</div>`}
    function product(s){return `${title(s)}<div class="mock"><div class="mockIn"><aside class="side"><div class="sideLogo"><div class="sideBadge">C</div><div>can<br><span style="color:#a5f3fc">hygiene</span></div></div>${[['dashboard','Dashboard'],['team','Employees'],['evaluation','Evaluations'],['chart','Statistics'],['training','Workshops']].map((m,i)=>`<div class="menuItem ${i===0?'active':''}">${icons[m[0]]} ${m[1]}</div>`).join('')}</aside><main class="content"><div class="topline"><div class="search">${icons.search} Search employees, evaluations...</div><div style="font-size:11px;text-align:right"><b>Ahmed Ben</b><br>Marketing manager</div></div><div class="banner"><div><small>Good morning, Admin</small><h3 style="margin:4px 0 0">You have 8 evaluations waiting for review.</h3></div><button style="border:0;border-radius:12px;background:rgba(255,255,255,.15);color:white;padding:10px 16px">Review now →</button></div><h2 style="margin:0 0 10px;font-size:28px">Search about employees<br>to evaluate</h2><div style="display:flex;gap:8px;margin-bottom:14px"><div style="border:2px solid #243887;background:white;border-radius:14px;width:320px;padding:10px;color:#94a3b8;font-size:12px">Search by name, department, role...</div><button style="background:#16c6b6;color:white;border:0;border-radius:14px;padding:0 22px;font-weight:900">search</button></div><div class="miniGrid"><div class="mini"><div class="orb">${icons.team}</div><p>Total Employees</p><h2>1,248</h2></div><div class="mini"><div class="orb">${icons.star}</div><p>Top Performers</p><small>#1 Sarah Johnson ★ 4.8<br>#2 Olivia Martinez ★ 4.6</small></div><div class="mini" style="background:#243887;color:white"><div class="orb">${icons.growth}</div><p>Quick Actions</p><small>New Evaluation →<br>Add Employee →<br>View Statistics →</small></div></div></main></div></div>`}
    function renderSlide(s){if(s.type==='hero')return hero(s); if(s.type==='featureGrid')return feature(s); if(s.type==='impact'||s.type==='saas')return metrics(s); if(s.type==='product')return product(s); if(s.type==='final')return `<div style="height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center"><div class="orb" style="height:80px;width:80px;font-size:42px">${icons.trophy}</div><div class="pill" style="margin-top:24px">${icons.value} ${s.eyebrow}</div><h1 class="title">${s.title}</h1><p class="subtitle">${s.subtitle}</p><div style="margin-top:28px;background:#20c9b5;color:#06112f;border-radius:26px;padding:16px 32px;font-size:20px;font-weight:950">Ready for real-world deployment</div></div>`; return `${title(s,s.type==='danger',s.theme==='yellow')}${bullets(s,s.ordered)}`}
    function render(){const s=slides[index],t=theme(s),a=accent(t); app.className='app '+t; app.innerHTML=`<div class="bg" style="background:${bg(t)}"></div><div class="grid"></div><div class="vignette"></div><div class="wrap"><header class="bar"><div class="brand"><div class="logoBox"><img class="logo" src="https://i.postimg.cc/MHMzL9CB/image.png" onerror="this.style.display='none'" /></div><div><div class="brandTitle">CANHYGIENE</div><div class="brandSub" style="color:${a}">Team 9 presentation</div></div></div><div class="right"><button class="auto" onclick="toggleAuto()">Auto: ${auto?'ON':'OFF'}</button><div class="dots">${slides.map((_,i)=>`<button class="dot ${i===index?'active':''}" onclick="go(${i})" style="${i===index?`background:${a};box-shadow:0 0 18px ${a}`:''}"></button>`).join('')}</div><div class="count" style="color:${a}">${index+1} / ${slides.length}</div></div></header><div class="progress"><div style="width:${((index+1)/slides.length)*100}%;background:${a};box-shadow:0 0 22px ${a}"></div></div><main class="main"><div class="glow" style="background:${a}55"></div><div class="glow two" style="background:${a}55"></div><section class="slide">${renderSlide(s)}</section></main><footer class="footer"><button class="nav" onclick="prev()">← Previous</button><div class="mid">Slide ${index+1} / ${slides.length} · use ← → or space</div><button class="nav next" onclick="next()" style="background:${a}">Next →</button></footer></div>`}
    function go(i){index=Math.max(0,Math.min(slides.length-1,i));render()} function next(){go(index+1)} function prev(){go(index-1)} function toggleAuto(){auto=!auto; if(timer)clearInterval(timer); if(auto)timer=setInterval(()=>{if(index<slides.length-1)next();else toggleAuto()},8000); render()} document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')next(); if(e.key==='ArrowLeft')prev()}); render();
  </script>
</body>
</html>
